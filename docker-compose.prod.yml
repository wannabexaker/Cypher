# Cypher — self-hosted production stack (Raspberry Pi, arm64).
# Run with the env file supplied for BOTH interpolation and container env:
#   docker compose --env-file .env.production -f docker-compose.prod.yml up -d --build
# Admin-only ports bind to 127.0.0.1. Public traffic arrives ONLY via cloudflared.
# See docs/deploy/RPI.md for the full runbook.

services:
  # ── Database ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    # No host port by default (avoids clashing with other projects' Postgres on
    # a shared host). Admin access: `docker compose ... exec postgres psql ...`.
    volumes:
      - cypher_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Object storage (private; browser reaches it via the tunnel) ────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY}
    # No host ports by default. In single-box mode the cloudflared container
    # reaches minio:9000 by name; on a shared host, docker-compose.pi.yml
    # publishes the S3 API on a free localhost port for the host cloudflared.
    volumes:
      - cypher_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  createbuckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY_ID} ${S3_SECRET_ACCESS_KEY};
      mc mb --ignore-existing local/${S3_BUCKET};
      mc anonymous set none local/${S3_BUCKET};
      exit 0;
      "
    restart: "no"

  # ── Rate-limit backend (Upstash-REST compatible over local Redis) ──────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - cypher_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  srh:
    image: hiett/serverless-redis-http:latest
    restart: unless-stopped
    environment:
      SRH_MODE: env
      SRH_TOKEN: ${UPSTASH_REDIS_REST_TOKEN}
      SRH_CONNECTION_STRING: "redis://redis:6379"
    depends_on:
      redis:
        condition: service_healthy

  # ── Malware scanning (ClamAV + internal-TLS HTTP wrapper) ──────────────────
  clamav:
    image: clamav/clamav:latest
    restart: unless-stopped
    volumes:
      - cypher_clamav_data:/var/lib/clamav
    healthcheck:
      test: ["CMD", "clamdcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s # first run downloads signatures via freshclam

  scanner:
    build:
      context: ./deploy/scanner
    restart: unless-stopped
    environment:
      SCANNER_TOKEN: ${MALWARE_SCAN_TOKEN}
      CLAMD_HOST: clamav
      CLAMD_PORT: "3310"
      TLS_KEY: /certs/scanner.key
      TLS_CERT: /certs/scanner.crt
      PORT: "8443"
    volumes:
      - ./deploy/scanner/certs:/certs:ro
    depends_on:
      clamav:
        condition: service_started

  # ── Schema migration (one-shot; app waits for it) ──────────────────────────
  migrate:
    build:
      context: .
      target: builder
    command: ["pnpm", "exec", "prisma", "migrate", "deploy"]
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ── Application ────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      target: runner
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      # Trust the scanner's self-signed internal cert (satisfies the prod
      # https requirement without ever exposing the scanner).
      NODE_EXTRA_CA_CERTS: /certs/scanner.crt
    volumes:
      - ./deploy/scanner/certs:/certs:ro
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
      srh:
        condition: service_started
      scanner:
        condition: service_started
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ── Scheduled jobs (replaces Vercel Cron) ──────────────────────────────────
  cron:
    build:
      context: ./deploy/cron
    restart: unless-stopped
    environment:
      CRON_SECRET: ${CRON_SECRET}
      APP_URL: "http://app:3000"
    depends_on:
      app:
        condition: service_started

  # ── Edge (Cloudflare Tunnel — public HTTPS, no port-forwarding) ────────────
  # Single-box mode only: start with `--profile edge`. On a host that already
  # runs cloudflared (sharing a tunnel with other projects), OMIT the profile
  # and route via the host service + docker-compose.pi.yml instead.
  cloudflared:
    image: cloudflare/cloudflared:latest
    profiles: ["edge"]
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      app:
        condition: service_started

volumes:
  cypher_pg_data:
  cypher_minio_data:
  cypher_redis_data:
  cypher_clamav_data:

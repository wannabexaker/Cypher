services:
  postgres:
    image: postgres:16-alpine
    container_name: cypher-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cypher
      POSTGRES_USER: cypher
      POSTGRES_PASSWORD: cypher
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - cypher_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cypher -d cypher"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: cypher-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-minioadmin}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - cypher_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  createbuckets:
    image: minio/mc:latest
    container_name: cypher-createbuckets
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY_ID:-minioadmin} ${S3_SECRET_ACCESS_KEY:-minioadmin};
      mc mb --ignore-existing local/${S3_BUCKET:-cypher-media};
      mc anonymous set none local/${S3_BUCKET:-cypher-media};
      exit 0;
      "

volumes:
  cypher_postgres_data:
  cypher_minio_data:

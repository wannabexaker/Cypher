services:
  postgres:
    image: postgres:16-alpine
    container_name: cypher-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cypher
      POSTGRES_USER: cypher
      POSTGRES_PASSWORD: cypher
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - cypher_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cypher -d cypher"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  cypher_postgres_data:
